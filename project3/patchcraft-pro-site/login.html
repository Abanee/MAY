<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark" class="scroll-smooth no-transitions">
<head>
  <link rel="icon" type="image/png" href="logo.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — PatchCraft Pro</title>
  <meta name="description" content="Sign in to your PatchCraft Pro account to manage orders, track production, and request reorders." />
  <meta name="theme-color" content="#0A0F1C" id="meta-theme-color" />
  <script>(function(){try{var t=localStorage.getItem('pcp-theme');document.documentElement.setAttribute('data-theme',t||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'));var d=localStorage.getItem('pcp-dir');if(d==='rtl'||d==='ltr')document.documentElement.setAttribute('dir',d);}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="style.css" />
  <script>tailwind.config={theme:{extend:{fontFamily:{jakarta:['"Plus Jakarta Sans"','sans-serif'],inter:['Inter','sans-serif']}}}};</script>
  <style>
    .auth-layout{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:40px 24px;position:relative;overflow:hidden;}
    .auth-glow-a{position:absolute;top:-10%;left:-10%;width:400px;height:400px;background:var(--amber-5);opacity:.03;border-radius:50%;filter:blur(100px);pointer-events:none;}
    .auth-glow-b{position:absolute;bottom:-10%;right:-10%;width:300px;height:300px;background:var(--indigo-5);opacity:.04;border-radius:50%;filter:blur(90px);pointer-events:none;}
    .auth-right{display:flex;align-items:center;justify-content:center;width:100%;z-index:2;}
    .auth-card{width:100%;max-width:420px;}
    .auth-form-input{width:100%;background:var(--surface);border:1px solid var(--border-strong);border-radius:12px;padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text-primary);outline:none;transition:border-color .25s ease,box-shadow .25s ease,background-color .4s ease;}
    .auth-form-input::placeholder{color:var(--text-faint-2);}
    .auth-form-input:focus{border-color:var(--amber-tint-30);box-shadow:0 0 0 3px var(--amber-tint-08);}
    .auth-input-wrap{position:relative;}
    .auth-input-icon{position:absolute;inset-inline-start:14px;top:50%;transform:translateY(-50%);color:var(--text-faint);pointer-events:none;}
    .auth-input-wrap .auth-form-input{padding-inline-start:42px;}
    .auth-eye-btn{position:absolute;inset-inline-end:14px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;color:var(--text-faint);padding:2px;transition:color .2s ease;}
    .auth-eye-btn:hover{color:var(--text-muted);}
    .auth-label{display:block;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
    .auth-btn{width:100%;padding:14px;background:var(--amber-5);color:var(--on-accent);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;border:none;border-radius:14px;cursor:pointer;transition:all .25s ease;display:flex;align-items:center;justify-content:center;gap:8px;}
    .auth-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px var(--amber-tint-20);}
    .auth-btn:active{transform:translateY(0);}
    .auth-divider{display:flex;align-items:center;gap:12px;margin:24px 0;}
    .auth-divider span{font-family:'Inter',sans-serif;font-size:12px;color:var(--text-faint-2);flex-shrink:0;}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .social-btn{width:100%;padding:12px;background:var(--surface);border:1px solid var(--border-strong);border-radius:12px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--text-body);cursor:pointer;transition:all .2s ease;}
    .social-btn:hover{border-color:var(--border-stronger);background:var(--surface-soft-hover);}
    .auth-feature{display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.07);}
    .auth-feature:last-child{border-bottom:none;}
    .auth-feature-icon{width:38px;height:38px;border-radius:10px;background:var(--amber-tint-10);border:1px solid var(--amber-tint-20);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .strength-bar{height:4px;border-radius:100px;background:var(--border-strong);overflow:hidden;margin-top:8px;}
    .strength-fill{height:100%;border-radius:100px;width:0%;transition:width .3s ease,background-color .3s ease;}
    @keyframes auth-slide-up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .auth-card{animation:auth-slide-up .6s cubic-bezier(.16,1,.3,1) both;}
  </style>
</head>
<body class="bg-[var(--bg)] text-[var(--text-primary)] font-inter antialiased">

  <div class="auth-layout">
    <!-- Glow backgrounds -->
    <div class="auth-glow-a"></div>
    <div class="auth-glow-b"></div>

    <!-- Top-Right Theme Toggle -->
    <div class="absolute top-6 right-6 z-50">
      <button id="theme-toggle" class="icon-toggle-btn" type="button" aria-pressed="false" aria-label="Toggle theme">
        <span class="theme-icon theme-icon-sun"><i data-lucide="sun" class="w-[18px] h-[18px]"></i></span>
        <span class="theme-icon theme-icon-moon"><i data-lucide="moon" class="w-[18px] h-[18px]"></i></span>
      </button>
    </div>

    <!-- CENTERED PANEL — login form -->
    <div class="auth-right">
      <div class="auth-card">

        <!-- Header with Logo + Text -->
        <div class="mb-8 flex flex-col items-center">
          <a href="index.html" class="flex items-center gap-2.5 font-jakarta font-extrabold text-2xl tracking-tight mb-6">
            <img src="logo.png" alt="PatchCraft Pro Logo" class="h-8 w-auto object-contain" />
            <span class="flex items-center gap-1.5 text-[var(--text-primary)]">
              <span>PATCH<span class="text-[var(--amber-5)]">CRAFT</span></span>
              <span class="text-[10px] font-inter font-medium text-[var(--text-faint)] tracking-widest mt-0.5">PRO</span>
            </span>
          </a>
          <h1 class="font-jakarta font-black text-3xl text-[var(--text-primary)] text-center mb-1">Welcome back</h1>
        </div>

        <!-- Form -->
        <form id="login-form" novalidate>
          <div class="mb-5">
            <label class="auth-label" for="login-email">Email Address</label>
            <div class="auth-input-wrap">
              <i data-lucide="mail" class="auth-input-icon w-4 h-4"></i>
              <input type="email" id="login-email" class="auth-form-input" placeholder="jane@company.com" required autocomplete="email" />
            </div>
          </div>

          <div class="mb-2">
            <label class="auth-label" for="login-password">Password</label>
            <div class="auth-input-wrap">
              <i data-lucide="lock" class="auth-input-icon w-4 h-4"></i>
              <input type="password" id="login-password" class="auth-form-input" placeholder="••••••••" required autocomplete="current-password" />
              <button type="button" class="auth-eye-btn" id="toggle-pw-login" aria-label="Toggle password visibility">
                <i data-lucide="eye" class="w-4 h-4" id="eye-icon-login"></i>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between mb-6 mt-3">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="filter-checkbox" id="remember-me" />
              <span class="text-sm font-inter text-[var(--text-faint)]">Remember me</span>
            </label>
            <a href="#" class="text-sm font-inter text-[var(--amber-4)] hover:opacity-80 transition-opacity font-semibold">Forgot password?</a>
          </div>

          <div id="login-error" class="hidden mb-4 p-3.5 rounded-xl bg-red-500/10 border border-red-500/25 flex items-center gap-2.5">
            <i data-lucide="alert-circle" class="w-4 h-4 text-red-400 flex-shrink-0"></i>
            <span class="text-sm font-inter text-red-400">Invalid email or password. Please try again.</span>
          </div>

          <button type="submit" class="auth-btn stitch-btn" id="login-submit">
            <i data-lucide="log-in" class="w-5 h-5"></i>
            Sign In to Dashboard
          </button>
        </form>

        <div class="auth-divider"><span>or sign in with</span></div>

        <!-- Social login -->
        <button class="social-btn mb-3" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <button class="social-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.22.67-2.94 1.5-.61.7-1.15 1.84-1.01 2.96 1.12.09 2.27-.59 2.96-1.4"/></svg>
          Continue with Apple
        </button>

        <p class="text-[var(--text-faint)] font-inter text-sm text-center mt-6">Don't have an account? <a href="signup.html" class="text-[var(--amber-4)] font-semibold hover:opacity-80 transition-opacity">Create one free</a></p>

        <p class="text-xs text-[var(--text-faint-2)] font-inter text-center mt-6 leading-relaxed">
          By signing in you agree to our <a href="#" class="text-[var(--amber-4)]">Terms</a> and <a href="#" class="text-[var(--amber-4)]">Privacy Policy</a>.
        </p>


      </div>
    </div>

  </div><!-- /.auth-layout -->

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Password visibility toggle
      var pwField = document.getElementById('login-password');
      var eyeBtn = document.getElementById('toggle-pw-login');
      if (eyeBtn && pwField) {
        eyeBtn.addEventListener('click', function () {
          var show = pwField.type === 'password';
          pwField.type = show ? 'text' : 'password';
          eyeBtn.querySelector('i').setAttribute('data-lucide', show ? 'eye-off' : 'eye');
          if (window.lucide) lucide.createIcons();
        });
      }

      // Form submit simulation
      var form = document.getElementById('login-form');
      var errBox = document.getElementById('login-error');
      var btn = document.getElementById('login-submit');
      if (form) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          if (!form.checkValidity()) { form.reportValidity(); return; }
          btn.disabled = true;
          btn.innerHTML = '<i data-lucide="loader-circle" class="w-5 h-5 animate-spin"></i> Signing in…';
          if (window.lucide) lucide.createIcons();
          // Demo: show error for wrong email
          setTimeout(function () {
            var email = document.getElementById('login-email').value;
            if (email === 'demo@patchcraftpro.com') {
              window.location.href = 'index.html'; // redirect on success
            } else {
              errBox.classList.remove('hidden');
              btn.disabled = false;
              btn.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Sign In to Dashboard';
              if (window.lucide) lucide.createIcons();
            }
          }, 1400);
        });
      }
    });
  </script>
</body>
</html>
