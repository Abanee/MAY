<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — ArtisanGrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
                document.documentElement.classList.add('light-theme');
            }
            const savedDir = localStorage.getItem('dir');
            if (savedDir === 'rtl') {
                document.documentElement.setAttribute('dir', 'rtl');
            }
        })();
    </script>
    <script>
        tailwind.config = {
            theme: {
                container: { center: true },
                extend: {
                    colors: {
                        carbon:   'var(--carbon)',
                        surface:  'var(--surface)',
                        surface2: 'var(--surface-2)',
                        offwhite: 'var(--offwhite)',
                        sec:      'var(--text-secondary)',
                        mut:      'var(--text-muted)',
                        volt:     'var(--volt)',
                        c1:       'var(--color-1)',
                        c2:       'var(--color-2)',
                        c3:       'var(--color-3)',
                        c4:       'var(--color-4)',
                        c5:       'var(--color-5)'
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="bg-carbon text-offwhite font-sans overflow-x-hidden">

    <!-- Film Grain Overlay -->
    <div class="grain-overlay" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <filter id="grain">
                <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
                <feColorMatrix type="saturate" values="0"/>
            </filter>
            <rect width="100%" height="100%" filter="url(#grain)" opacity="1"/>
        </svg>
    </div>

    <!-- AUTH SECTION CONTAINER -->
    <main class="auth-wrapper min-h-screen flex items-center justify-center py-12">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="inline-flex items-center gap-2.5 font-mono font-bold text-2xl tracking-tight justify-center mb-4">
                    <img src="logo.png" alt="ArtisanGrid Logo" class="h-8 w-auto">
                    <span><span class="text-volt">Artisan</span><span class="text-offwhite">Grid</span></span>
                </a>
                <h1 class="auth-welcome font-mono">Welcome Back</h1>
                <p class="auth-sub">Enter your details to access your dashboard</p>
            </div>

            <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="auth-group">
                    <label for="email" class="auth-label">EMAIL ADDRESS</label>
                    <input type="email" id="email" class="auth-input font-mono" placeholder="you@domain.com" required autocomplete="email">
                </div>

                <div class="auth-group">
                    <label for="password" class="auth-label">PASSWORD</label>
                    <div class="relative w-full">
                        <input type="password" id="password" class="auth-input font-mono w-full pr-12" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-sec hover:text-offwhite focus:outline-none" aria-label="Toggle password visibility">
                            <!-- Eye icon (visible state) -->
                            <svg class="eye-icon w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.43 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <!-- Eye off icon (hidden state) -->
                            <svg class="eye-off-icon w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.895 7.895L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                        </button>
                    </div>
                    <div class="flex justify-between items-center mt-1">
                        <label class="flex items-center gap-2 cursor-pointer font-mono text-[10px] text-sec hover:text-offwhite select-none">
                            <input type="checkbox" id="remember-me" class="rounded bg-carbon border border-[var(--border)] text-volt w-3 h-3 accent-[var(--volt)]">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="font-mono text-[10px] text-volt hover:underline">Forgot password?</a>
                    </div>
                </div>

                <button type="submit" class="auth-btn">Log In →</button>
            </form>

            <div class="auth-divider">OR CONNECT WITH</div>

            <div class="social-auth-grid">
                <button class="social-auth-btn" onclick="alert('Google Authentication Access triggered.');">
                    <svg viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                    </svg>
                    Google
                </button>
                <button class="social-auth-btn" onclick="alert('Apple Authentication Access triggered.');">
                    <svg viewBox="0 0 24 24">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.57 2.95-1.39z"/>
                    </svg>
                    Apple
                </button>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </div>
    </main>
    <script>
        (function() {
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('toggle-password');
            if (passwordInput && togglePasswordBtn) {
                const eyeIcon = togglePasswordBtn.querySelector('.eye-icon');
                const eyeOffIcon = togglePasswordBtn.querySelector('.eye-off-icon');
                togglePasswordBtn.addEventListener('click', () => {
                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        eyeIcon.classList.add('hidden');
                        eyeOffIcon.classList.remove('hidden');
                    } else {
                        passwordInput.type = 'password';
                        eyeIcon.classList.remove('hidden');
                        eyeOffIcon.classList.add('hidden');
                    }
                });
            }
        })();
    </script>
    <script src="script.js"></script>
    <script src="pages.js"></script>
</body>
</html>
