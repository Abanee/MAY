<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PopCraft — Create your account today to earn rewards, save order settings, and personalize subscriptions." />
  <meta name="theme-color" content="#D97706" />
  <title>Sign Up — PopCraft Gourmet Popcorn Co.</title>

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23D97706'/><circle cx='12' cy='12' r='4' fill='white' opacity='.9'/><circle cx='20' cy='11' r='3' fill='white' opacity='.9'/><circle cx='10' cy='19' r='3' fill='white' opacity='.8'/><circle cx='19' cy='20' r='4' fill='white' opacity='.9'/><circle cx='15' cy='22' r='2.5' fill='white' opacity='.7'/></svg>" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display:    ['"Playfair Display"', 'serif'],
            cormorant:  ['"Cormorant Garamond"', 'serif'],
            body:       ['"DM Sans"', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="global.css" />
</head>
<body>

<!-- ======================================================
  SCROLL PROGRESS BAR
======================================================= -->
<div id="scroll-progress" class="scroll-progress" aria-hidden="true"></div>

<!-- ======================================================
  GRAIN OVERLAY
======================================================= -->
<div class="grain-overlay" aria-hidden="true"></div>

<!-- ======================================================
  CART TOAST NOTIFICATION
======================================================= -->
<div id="cart-toast" role="alert" aria-live="polite">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-text">Item added to cart!</span>
</div>

<!-- Navigation removed for clean signup screen -->

<!-- ======================================================
  MAIN CONTENT (SIGN UP FORM CARD)
======================================================= -->
<main class="auth-section">
  <!-- Decorative Background Glows -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-20 dark:opacity-10" aria-hidden="true">
    <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-[var(--accent-gold)] filter blur-[120px]"></div>
    <div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-[var(--accent-caramel)] filter blur-[120px]"></div>
  </div>

  <div class="auth-card">
    <div class="text-center">
      <!-- Back to Home Logo link -->
      <a href="index.html" class="flex items-center justify-center gap-3 mb-6 group" aria-label="PopCraft Home">
        <div class="nav-logo-badge">
          <img src="Assets/logo.svg" alt="PopCraft Logo" class="w-[18px] h-[18px]" />
        </div>
        <div class="text-left">
          <div class="flex items-baseline gap-0.5">
            <span class="font-display text-xl font-bold tracking-tight text-[var(--text-primary)]">Pop</span>
            <span class="font-display text-xl font-bold tracking-tight" style="color:var(--accent-gold)">Craft</span>
          </div>
          <p style="font-size:0.52rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-secondary)">Artisan Popcorn Co.</p>
        </div>
      </a>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle mt-2">Join the PopCraft Club to earn reward points, save your favorite flavors, and customize subscriptions.</p>
    </div>

    <form class="auth-form" id="signup-form" autocomplete="on">
      <div class="form-group">
        <label for="signup-name" class="form-label">Full Name</label>
        <input type="text" id="signup-name" class="auth-input" placeholder="John Doe" required autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="signup-email" class="form-label">Email Address</label>
        <input type="email" id="signup-email" class="auth-input" placeholder="you@example.com" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="signup-password" class="form-label">Password</label>
        <div class="relative">
          <input type="password" id="signup-password" class="auth-input" placeholder="•••••••• (Min 8 characters)" required autocomplete="new-password" minlength="8" style="padding-right: 2.75rem;" />
          <button type="button" class="toggle-password-btn absolute right-3 top-1/2 -translate-y-1/2 text-[var(--text-secondary)] hover:text-[var(--text-primary)]" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; outline: none;" aria-label="Toggle password visibility">
            <svg class="eye-open w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg class="eye-closed w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="signup-confirm" class="form-label">Confirm Password</label>
        <div class="relative">
          <input type="password" id="signup-confirm" class="auth-input" placeholder="••••••••" required autocomplete="new-password" minlength="8" style="padding-right: 2.75rem;" />
          <button type="button" class="toggle-password-btn absolute right-3 top-1/2 -translate-y-1/2 text-[var(--text-secondary)] hover:text-[var(--text-primary)]" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; outline: none;" aria-label="Toggle password visibility">
            <svg class="eye-open w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg class="eye-closed w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
            </svg>
          </button>
        </div>
      </div>

      <div class="auth-options">
        <label class="auth-checkbox-label">
          <input type="checkbox" id="terms" required />
          <span class="text-xs">I agree to the <a href="#" class="auth-link">Terms of Service</a> &amp; <a href="#" class="auth-link">Privacy Policy</a></span>
        </label>
      </div>

      <button type="submit" class="auth-btn">
        Create Account
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </form>

    <div class="auth-divider">or sign up with</div>

    <!-- Social Signup Buttons -->
    <div class="social-login-group">
      <button type="button" class="social-btn" id="google-signup-btn" aria-label="Sign up with Google">
        <!-- Google Icon -->
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.81-.63-1.37-1.52-1.37-2.63z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
        </svg>
        <span>Google</span>
      </button>
      <button type="button" class="social-btn" id="apple-signup-btn" aria-label="Sign up with Apple">
        <!-- Apple Icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.22.67-2.94 1.52-.64.74-1.2 1.88-1.05 3 .9.07 2.34-.65 3-1.46z"/>
        </svg>
        <span>Apple</span>
      </button>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="login.html" class="auth-link">Log in</a>
    </div>
  </div>
</main>

<!-- Footer removed for clean signup screen -->


<!-- ======================================================
  SCRIPTS
======================================================= -->
<script src="scripts.js"></script>

</body>
</html>
